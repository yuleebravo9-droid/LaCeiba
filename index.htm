<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Ceiba</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Libre Baskerville',serif;
background:linear-gradient(#E8B45C,#C85C2E,#7A2E2E);
color:#3B2A22;
overflow-x:hidden;
}

header{
background-image:url("https://i.pinimg.com/736x/ae/44/ae/ae44aecf04e81d829b7b62fa50cda247.jpg");
background-size:cover;
background-position:center;
height:340px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

header h1{
font-family:'Playfair Display';
font-size:72px;
background:rgba(0,0,0,0.4);
padding:12px 34px;
border-radius:12px;
margin:0;
}

header button{
margin-top:15px;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

/* editor */
#editor{
display:none;
background:#FFF6E9;
padding:20px;
border-radius:10px;
margin-bottom:40px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

textarea,input{
width:100%;
padding:10px;
margin-bottom:10px;
font-family:'Libre Baskerville';
border-radius:6px;
border:none;
}

/* biblioteca */
.relato{
background:#FFF6E9;
padding:25px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

button{
background:#C85C2E;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* lector */
#lector{
display:none;
background:#FFF6E9;
padding:40px;
border-radius:10px;
line-height:1.9;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

#lector h2{
font-family:'Playfair Display';
}

/* comentarios */
.comment{
background:#eee;
padding:6px;
margin-top:5px;
border-radius:5px;
}

/* autor */
.author{
display:flex;
gap:20px;
background:#FFF6E9;
padding:20px;
border-radius:10px;
margin-top:40px;
align-items:center;
}

.author img{
width:130px;
border-radius:50%;
}

#avatarEditor{
display:none;
margin-top:10px;
}

/* modo nocturno */
.dark{
background:#0f0f18;
color:#eee;
}

.dark .relato,
.dark #editor,
.dark #lector,
.dark .author{
background:#1f1f2a;
}

/* estrellas */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
}

/* luciernagas */
.firefly{
position:fixed;
width:6px;
height:6px;
background:#FFD86B;
border-radius:50%;
box-shadow:0 0 10px #FFD86B;
animation:blink 3s infinite;
}

@keyframes blink{
0%,100%{opacity:0.2}
50%{opacity:1}
}
</style>

</head>

<body>

<header>
<h1>La Ceiba</h1>
<button onclick="toggleDark()">Modo nocturno</button>
</header>

<div class="container">

<div id="editor">

<h2>Escribir relato</h2>

<input id="titulo" placeholder="Título del relato">

<textarea id="texto" rows="7" placeholder="Escribe tu relato..."></textarea>

<button onclick="publicar()">Publicar</button>

</div>

<h2>Buscar relatos</h2>

<input id="buscar" placeholder="Buscar..." onkeyup="buscar()">

<h2>Biblioteca</h2>

<div id="biblioteca"></div>

<div id="lector">

<h2 id="tituloLectura"></h2>

<p id="textoLectura"></p>

<p id="contador"></p>

<button onclick="volver()">⬅ Volver a la biblioteca</button>

</div>

<div class="author">

<div>

<img id="avatar" src="yuleidys-cartoon.png.png">

<div id="avatarEditor">

<input type="file" id="subirAvatar">

</div>

</div>

<div>

<h3>Sobre la autora</h3>

<p>
Soy Yuleidys. Escribo relatos que nacen de emociones, recuerdos y momentos pequeños de la vida.
La Ceiba es un refugio para quienes aman leer historias que brotan del alma.
</p>

</div>

</div>

</div>

<script>

let relatos=JSON.parse(localStorage.getItem("relatos"))||[];

function guardar(){
localStorage.setItem("relatos",JSON.stringify(relatos));
}

/* publicar */

function publicar(){

let t=document.getElementById("titulo").value;
let x=document.getElementById("texto").value;

if(!t||!x)return;

relatos.push({
titulo:t,
texto:x,
likes:0,
comentarios:[],
lecturas:0
});

guardar();
mostrar();

document.getElementById("titulo").value="";
document.getElementById("texto").value="";

}

/* mostrar biblioteca */

function mostrar(){

let cont=document.getElementById("biblioteca");
cont.innerHTML="";

relatos.forEach((r,i)=>{

let div=document.createElement("div");
div.className="relato";

div.innerHTML=`

<h3>${r.titulo}</h3>

<p>${r.texto.substring(0,140)}...</p>

<button onclick="leer(${i})">Leer</button>

<button onclick="like(${i})">❤️ ${r.likes}</button>

<div>
<input id="c${i}" placeholder="Comentar">
<button onclick="comentar(${i})">Enviar</button>
</div>

<div>
${r.comentarios.map(c=>"<div class='comment'>"+c+"</div>").join("")}
</div>

`;

cont.appendChild(div);

});

}

/* leer */

function leer(i){

document.getElementById("biblioteca").style.display="none";
document.getElementById("lector").style.display="block";

document.getElementById("tituloLectura").innerText=relatos[i].titulo;
document.getElementById("textoLectura").innerText=relatos[i].texto;

relatos[i].lecturas++;

document.getElementById("contador").innerText="Lecturas: "+relatos[i].lecturas;

guardar();

}

/* volver */

function volver(){

document.getElementById("biblioteca").style.display="block";
document.getElementById("lector").style.display="none";

}

/* like */

function like(i){
relatos[i].likes++;
guardar();
mostrar();
}

/* comentarios */

function comentar(i){

let input=document.getElementById("c"+i);

if(!input.value)return;

relatos[i].comentarios.push(input.value);

guardar();
mostrar();

}

/* buscar */

function buscar(){

let filtro=document.getElementById("buscar").value.toLowerCase();

let cont=document.getElementById("biblioteca");

cont.innerHTML="";

relatos.filter(r=>r.titulo.toLowerCase().includes(filtro)).forEach((r,i)=>{

let div=document.createElement("div");

div.className="relato";

div.innerHTML=`<h3>${r.titulo}</h3>
<p>${r.texto.substring(0,140)}...</p>
<button onclick="leer(${i})">Leer</button>`;

cont.appendChild(div);

});

}

/* modo nocturno */

function toggleDark(){

document.body.classList.toggle("dark");

crearEstrellas();

}

/* estrellas */

function crearEstrellas(){

for(let i=0;i<80;i++){

let s=document.createElement("div");
s.className="star";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

}

}

/* editor y avatar solo en modo edit */

if(window.location.hash === "#edit"){

document.getElementById("editor").style.display="block";
document.getElementById("avatarEditor").style.display="block";

}

/* subir avatar */

let avatarGuardado = localStorage.getItem("avatar");

if(avatarGuardado){
document.getElementById("avatar").src = avatarGuardado;
}

let subir=document.getElementById("subirAvatar");

if(subir){

subir.addEventListener("change",function(){

let file=this.files[0];

let reader=new FileReader();

reader.onload=function(e){

let img=e.target.result;

document.getElementById("avatar").src=img;

localStorage.setItem("avatar",img);

}

reader.readAsDataURL(file);

});

}

/* luciernagas */

for(let i=0;i<18;i++){

let f=document.createElement("div");
f.className="firefly";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";

document.body.appendChild(f);

}

mostrar();

</script>

</body>
</html>
