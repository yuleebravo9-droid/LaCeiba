<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Ceiba</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Libre Baskerville',serif;
background:linear-gradient(#E8B45C,#C85C2E,#7A2E2E);
color:#3B2A22;
}

header{
background-image:url("https://i.pinimg.com/736x/ae/44/ae/ae44aecf04e81d829b7b62fa50cda247.jpg");
background-size:cover;
height:340px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

header h1{
font-family:'Playfair Display';
font-size:70px;
background:rgba(0,0,0,0.4);
padding:12px 30px;
border-radius:10px;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.relato{
background:#FFF6E9;
padding:30px;
border-radius:10px;
margin-bottom:40px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
white-space:pre-line;
}

textarea,input{
width:100%;
padding:10px;
margin-bottom:10px;
font-family:'Libre Baskerville';
}

button{
background:#C85C2E;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

/* lector */

#lector{
display:none;
background:#FFF6E9;
padding:40px;
border-radius:10px;
}

/* editor */

#editor{
display:none;
background:#FFF6E9;
padding:20px;
border-radius:10px;
margin-bottom:40px;
}

/* autora */

.author{
display:flex;
gap:20px;
background:#FFF6E9;
padding:20px;
border-radius:10px;
margin-top:40px;
align-items:center;
}

.author img{
width:120px;
border-radius:50%;
}

/* modo nocturno */

.dark{
background:#111118;
color:#eee;
}

.dark .relato,
.dark .author,
.dark #editor,
.dark #lector{
background:#1f1f2a;
}

/* luciernagas */

.firefly{
position:fixed;
width:6px;
height:6px;
background:#FFD86B;
border-radius:50%;
box-shadow:0 0 10px #FFD86B;
animation:blink 3s infinite;
}

@keyframes blink{
0%,100%{opacity:0.2}
50%{opacity:1}
}

</style>

</head>

<body>

<header>

<h1>La Ceiba</h1>

<button onclick="toggleDark()">Modo nocturno</button>

</header>

<div class="container">

<div id="editor">

<h2>Nuevo relato</h2>

<input id="titulo" placeholder="Título">

<textarea id="texto" rows="8" placeholder="Escribe tu relato"></textarea>

<button onclick="publicar()">Publicar relato</button>

<hr>

<h3>Cambiar avatar</h3>

<input type="file" id="subirAvatar">

</div>

<h2>Buscar</h2>

<input id="buscar" placeholder="Buscar relatos..." onkeyup="buscar()">

<h2>Biblioteca</h2>

<div id="biblioteca"></div>

<div id="lector">

<h2 id="tituloLectura"></h2>

<p id="textoLectura"></p>

<button onclick="volver()">⬅ Volver a la biblioteca</button>

</div>

<div class="author">

<img id="avatar">

<div>

<h3>Sobre la autora</h3>

<p>
Soy Yuleidys. Bienvenido a La Ceiba, mi pequeño refugio literario donde comparto historias nacidas de emociones y recuerdos.
</p>

</div>

</div>

</div>

<script>

let relatos=JSON.parse(localStorage.getItem("relatos"))||[];

let modoEditor=false;

function guardar(){
localStorage.setItem("relatos",JSON.stringify(relatos));
}

function publicar(){

let t=document.getElementById("titulo").value;
let x=document.getElementById("texto").value;

if(!t||!x)return;

relatos.push({titulo:t,texto:x});

guardar();
mostrar();

document.getElementById("titulo").value="";
document.getElementById("texto").value="";

}

function eliminar(i){

if(!modoEditor)return;

relatos.splice(i,1);

guardar();

mostrar();

}

function mostrar(){

let cont=document.getElementById("biblioteca");

cont.innerHTML="";

relatos.forEach((r,i)=>{

let div=document.createElement("div");

div.className="relato";

let botones=`<button onclick="leer(${i})">Leer relato</button>`;

if(modoEditor){

botones+=`<br><button onclick="eliminar(${i})">Eliminar</button>`;

}

div.innerHTML=`

<h3>${r.titulo}</h3>

<p>${r.texto.substring(0,120)}...</p>

${botones}

`;

cont.appendChild(div);

});

}

function leer(i){

document.getElementById("biblioteca").style.display="none";

document.getElementById("lector").style.display="block";

document.getElementById("tituloLectura").innerText=relatos[i].titulo;

document.getElementById("textoLectura").innerText=relatos[i].texto;

}

function volver(){

document.getElementById("biblioteca").style.display="block";

document.getElementById("lector").style.display="none";

}

function buscar(){

let filtro=document.getElementById("buscar").value.toLowerCase();

let relatos=document.querySelectorAll(".relato");

relatos.forEach(r=>{

let texto=r.innerText.toLowerCase();

r.style.display=texto.includes(filtro)?"block":"none";

});

}

function toggleDark(){
document.body.classList.toggle("dark");
}

/* modo editor */

if(window.location.hash === "#edit"){

modoEditor=true;

document.getElementById("editor").style.display="block";

}

/* avatar */

let avatarGuardado=localStorage.getItem("avatar");

if(avatarGuardado){

document.getElementById("avatar").src=avatarGuardado;

}

let subir=document.getElementById("subirAvatar");

if(subir){

subir.addEventListener("change",function(){

let file=this.files[0];

let reader=new FileReader();

reader.onload=function(e){

let img=e.target.result;

document.getElementById("avatar").src=img;

localStorage.setItem("avatar",img);

}

reader.readAsDataURL(file);

});

}

/* luciernagas */

for(let i=0;i<15;i++){

let f=document.createElement("div");

f.className="firefly";

f.style.left=Math.random()*100+"vw";

f.style.top=Math.random()*100+"vh";

document.body.appendChild(f);

}

mostrar();

</script>

</body>
</html>
