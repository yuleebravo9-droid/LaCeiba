<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Ceiba</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Libre Baskerville',serif;
background:linear-gradient(#E8B45C,#C85C2E,#7A2E2E);
color:#3B2A22;
overflow-x:hidden;
}

header{
background-image:url("https://i.pinimg.com/736x/ae/44/ae/ae44aecf04e81d829b7b62fa50cda247.jpg");
background-size:cover;
height:350px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

header h1{
font-family:'Playfair Display';
font-size:70px;
background:rgba(0,0,0,0.4);
padding:15px 35px;
border-radius:10px;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.relato{
background:#FFF6E9;
padding:30px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

textarea,input{
width:100%;
padding:10px;
margin-bottom:10px;
font-family:'Libre Baskerville';
}

button{
background:#C85C2E;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

#lector{
display:none;
}

.comment{
background:#eee;
padding:6px;
margin-top:5px;
border-radius:5px;
}

/* modo nocturno */

.dark{
background:#0f0f18;
color:#eee;
}

.dark .relato{
background:#1e1e2a;
}

/* estrellas */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
}

/* luciernagas */

.firefly{
position:fixed;
width:6px;
height:6px;
background:#FFD86B;
border-radius:50%;
box-shadow:0 0 10px #FFD86B;
animation:blink 3s infinite;
}

@keyframes blink{
0%,100%{opacity:0.2}
50%{opacity:1}
}

</style>

</head>

<body>

<header>

<h1>La Ceiba</h1>

<button onclick="toggleDark()">Modo nocturno</button>

</header>

<div class="container">

<h2>Escribir relato</h2>

<input id="titulo" placeholder="Título">

<textarea id="texto" rows="6" placeholder="Escribe tu relato..."></textarea>

<button onclick="publicar()">Publicar</button>

<h2>Buscar</h2>

<input id="buscar" onkeyup="buscar()" placeholder="Buscar relatos">

<h2>Biblioteca</h2>

<div id="biblioteca"></div>

<div id="lector" class="relato">

<h2 id="tituloLectura"></h2>

<p id="textoLectura"></p>

<p id="contador"></p>

<button onclick="volver()">⬅ Volver</button>

</div>

</div>

<script>

let relatos=JSON.parse(localStorage.getItem("relatos"))||[];

function guardar(){
localStorage.setItem("relatos",JSON.stringify(relatos));
}

function publicar(){

let t=document.getElementById("titulo").value;
let x=document.getElementById("texto").value;

if(!t||!x)return;

relatos.push({
titulo:t,
texto:x,
likes:0,
comentarios:[],
lecturas:0
});

guardar();
mostrar();

}

function mostrar(){

let cont=document.getElementById("biblioteca");
cont.innerHTML="";

relatos.forEach((r,i)=>{

let div=document.createElement("div");
div.className="relato";

div.innerHTML=`

<h3>${r.titulo}</h3>

<p>${r.texto.substring(0,120)}...</p>

<button onclick="leer(${i})">Leer</button>

<button onclick="like(${i})">❤️ ${r.likes}</button>

<div>

<input id="c${i}" placeholder="Comentar">

<button onclick="comentar(${i})">Enviar</button>

</div>

<div>

${r.comentarios.map(c=>"<div class='comment'>"+c+"</div>").join("")}

</div>

`;

cont.appendChild(div);

});

}

function leer(i){

document.getElementById("biblioteca").style.display="none";
document.getElementById("lector").style.display="block";

document.getElementById("tituloLectura").innerText=relatos[i].titulo;
document.getElementById("textoLectura").innerText=relatos[i].texto;

relatos[i].lecturas++;

document.getElementById("contador").innerText="Lecturas: "+relatos[i].lecturas;

guardar();

}

function volver(){

document.getElementById("biblioteca").style.display="block";
document.getElementById("lector").style.display="none";

}

function like(i){

relatos[i].likes++;

guardar();
mostrar();

}

function comentar(i){

let input=document.getElementById("c"+i);

if(!input.value)return;

relatos[i].comentarios.push(input.value);

guardar();
mostrar();

}

function buscar(){

let filtro=document.getElementById("buscar").value.toLowerCase();

let cont=document.getElementById("biblioteca");

cont.innerHTML="";

relatos.filter(r=>r.titulo.toLowerCase().includes(filtro)).forEach((r,i)=>{

let div=document.createElement("div");

div.className="relato";

div.innerHTML=`<h3>${r.titulo}</h3><p>${r.texto.substring(0,120)}...</p><button onclick="leer(${i})">Leer</button>`;

cont.appendChild(div);

});

}

function toggleDark(){

document.body.classList.toggle("dark");

crearEstrellas();

}

function crearEstrellas(){

for(let i=0;i<80;i++){

let s=document.createElement("div");
s.className="star";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

}

}

/* luciernagas */

for(let i=0;i<20;i++){

let f=document.createElement("div");
f.className="firefly";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";

document.body.appendChild(f);

}

mostrar();

</script>

</body>
</html>
