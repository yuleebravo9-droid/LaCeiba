<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Ceiba</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>
:root{
--rojo:#7A2E2E;
--naranja:#C85C2E;
--dorado:#E8B45C;
--crema:#FFF6E9;
--tinta:#3B2A22;
}

body{
margin:0;
font-family:'Libre Baskerville',serif;
background:linear-gradient(var(--dorado),var(--naranja),var(--rojo));
color:var(--tinta);
}

header{
background-image:url("https://i.pinimg.com/736x/ae/44/ae/ae44aecf04e81d829b7b62fa50cda247.jpg");
background-size:cover;
background-position:center;
height:380px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

header h1{
font-family:'Playfair Display',serif;
font-size:72px;
margin:0;
padding:15px 35px;
background:rgba(0,0,0,0.35);
border-radius:10px;
}

header p{
font-size:20px;
margin-top:10px;
background:rgba(0,0,0,0.25);
padding:6px 15px;
border-radius:6px;
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.relato{
background:var(--crema);
padding:35px;
margin-bottom:35px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.relato h2{
font-family:'Playfair Display',serif;
color:var(--naranja);
margin-top:0;
}

button{
background:var(--naranja);
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

#editor{display:none}

.author{
display:flex;
align-items:center;
gap:25px;
margin-top:80px;
background:var(--crema);
padding:25px;
border-radius:12px;
}

.author img{
width:150px;
border-radius:50%;
}

.link-box{
background:#fff;
padding:10px;
margin-top:10px;
font-size:14px;
border-radius:6px;
}

.modal{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.book{
background:#fff;
max-width:700px;
padding:40px;
border-radius:8px;
line-height:1.8;
}

</style>
</head>

<body>

<header>
<h1>La Ceiba</h1>
<p>Relatos que nacen del alma</p>
</header>

<div class="container">

<div id="relatos"></div>

<!-- EDITOR SOLO PARA AUTORA -->
<div class="relato" id="editor">
<h2>Nuevo relato</h2>
<input id="titulo" placeholder="Título" style="width:100%;padding:10px;margin-bottom:10px">
<textarea id="texto" placeholder="Escribe tu relato" style="width:100%;height:120px;padding:10px"></textarea>
<br><br>
<button onclick="publicar()">Publicar</button>

<h3>Links de tu blog</h3>
<div class="link-box">Link lectores:<br><span id="readerLink"></span></div>
<div class="link-box">Link editar:<br><span id="editLink"></span></div>
</div>

<!-- AUTORA -->
<div class="author">
<div>
<img id="avatar" src="yuleidys-cartoon.png">
<div id="avatarEdit" style="display:none;margin-top:10px">
<input type="file" id="avatarUpload">
</div>
</div>

<div>
<h2>Sobre la autora</h2>
<p>
Soy Yuleidys. Escribo relatos que nacen de emociones y momentos pequeños de la vida.
</p>
</div>
</div>

</div>

<div class="modal" id="modal">
<div class="book">
<h2 id="modalTitle"></h2>
<p id="modalText"></p>
<button onclick="cerrar()">Cerrar</button>
</div>
</div>

<script>

function publicar(){
let titulo=document.getElementById('titulo').value
let texto=document.getElementById('texto').value
if(!titulo||!texto)return

let relatos=JSON.parse(localStorage.getItem('relatos')||'[]')
relatos.push({titulo,texto})
localStorage.setItem('relatos',JSON.stringify(relatos))

cargar()
}

function cargar(){
let cont=document.getElementById('relatos')
cont.innerHTML=''

let relatos=JSON.parse(localStorage.getItem('relatos')||'[]')

relatos.forEach((r,i)=>{
let div=document.createElement('div')
div.className='relato'
div.innerHTML=`
<h2>${r.titulo}</h2>
<p>${r.texto.substring(0,120)}...</p>
<button onclick="leer(${i})">Leer</button>
`
cont.appendChild(div)
})
}

function leer(i){
let relatos=JSON.parse(localStorage.getItem('relatos')||'[]')
document.getElementById('modalTitle').innerText=relatos[i].titulo

document.getElementById('modalText').innerText=relatos[i].texto

document.getElementById('modal').style.display='flex'
}

function cerrar(){

document.getElementById('modal').style.display='none'

}

/* AVATAR EDIT SOLO AUTORA */

function cargarAvatar(){
let saved=localStorage.getItem('avatar')
if(saved){document.getElementById('avatar').src=saved}
}

let uploader=document.getElementById('avatarUpload')

if(uploader){

uploader.addEventListener('change',function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(e){

let img=e.target.result

document.getElementById('avatar').src=img

localStorage.setItem('avatar',img)

}

reader.readAsDataURL(file)

})

}


window.onload=function(){

cargar()

cargarAvatar()

let base=window.location.href.split('#')[0]

document.getElementById('readerLink').innerText=base

document.getElementById('editLink').innerText=base+'#edit'


if(window.location.hash==='#edit'){

 document.getElementById('editor').style.display='block'

 document.getElementById('avatarEdit').style.display='block'

}

}

</script>

</body>
</html>
